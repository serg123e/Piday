<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi Trance — Infinite Pi Day Generator</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>π</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a100a;
  color: #33ff33;
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  position: relative;
}

/* Giant Pi background */
.pi-bg {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: min(80vw, 80vh);
  color: rgba(0, 255, 0, 0.06);
  font-family: 'Times New Roman', serif;
  pointer-events: none;
  z-index: 0;
  user-select: none;
  transition: color 0.5s;
}
body.playing .pi-bg {
  color: rgba(0, 255, 0, 0.10);
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 720px;
  padding: 30px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

h1 {
  font-size: 1.4em;
  color: #33ff33;
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* Digit display */
.digit-display {
  width: 100%;
  background: rgba(0, 20, 0, 0.6);
  border: 1px solid rgba(0, 255, 0, 0.3);
  border-radius: 8px;
  padding: 16px 20px;
  font-size: 1.5em;
  letter-spacing: 4px;
  min-height: 60px;
  text-align: center;
  color: #20cc20;
  white-space: nowrap;
  overflow: hidden;
  line-height: 1.6;
}
.digit-display .current {
  color: #fff;
  text-shadow: 0 0 12px #33ff33, 0 0 24px #00cc00;
  font-weight: bold;
}
.digit-display .dot {
  color: #66ff66;
}
.digit-display .dim {
  color: #0a550a;
}

/* Play/Stop */
.transport {
  display: flex;
  gap: 16px;
}
.transport button {
  background: rgba(0, 255, 0, 0.1);
  border: 2px solid #1a8a1a;
  color: #33ff33;
  font-family: inherit;
  font-size: 1.2em;
  padding: 14px 36px;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.15s;
  letter-spacing: 2px;
}
.transport button:hover {
  background: rgba(0, 255, 0, 0.25);
  border-color: #33ff33;
  color: #fff;
}
.transport button:active {
  transform: scale(0.97);
}
.transport button.active {
  background: rgba(0, 255, 0, 0.3);
  border-color: #66ff66;
  color: #fff;
  box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
}

/* Toggle grid */
.toggles {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  width: 100%;
}
.toggle-btn {
  aspect-ratio: 1;
  background: rgba(0, 20, 0, 0.5);
  border: 2px solid #0a550a;
  border-radius: 8px;
  color: #1a8a1a;
  font-family: inherit;
  font-size: 0.75em;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  transition: all 0.15s;
  user-select: none;
}
.toggle-btn .icon {
  font-size: 1.6em;
}
.toggle-btn.on {
  background: rgba(0, 255, 0, 0.15);
  border-color: #1a8a1a;
  color: #33ff33;
  box-shadow: 0 0 12px rgba(0, 255, 0, 0.2);
}
.toggle-btn:hover {
  border-color: #20cc20;
  color: #33ff33;
}

/* Sliders */
.sliders {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.slider-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.slider-label {
  width: 100px;
  text-align: right;
  font-size: 0.85em;
  color: #1a8a1a;
  flex-shrink: 0;
}
.slider-row input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  background: #0a200a;
  border-radius: 3px;
  outline: none;
}
.slider-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  background: #1a8a1a;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid #33ff33;
}
.slider-row input[type="range"]::-moz-range-thumb {
  width: 18px;
  height: 18px;
  background: #1a8a1a;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid #33ff33;
}
.slider-value {
  width: 60px;
  font-size: 0.9em;
  color: #20cc20;
  text-align: left;
}

/* Status */
.status {
  font-size: 0.8em;
  color: #0a770a;
  text-align: center;
}

/* Loading overlay */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10, 10, 15, 0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  flex-direction: column;
  gap: 16px;
}
.loading-overlay.hidden { display: none; }
.loading-text {
  color: #33ff33;
  font-size: 1.2em;
  letter-spacing: 2px;
}
.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid #0a300a;
  border-top-color: #33ff33;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 500px) {
  .toggles { grid-template-columns: repeat(3, 1fr); }
  .digit-display { font-size: 1.1em; }
}
</style>
</head>
<body>

<div class="pi-bg">&pi;</div>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading samples...</div>
</div>

<div class="container">
  <h1>&pi; Trance</h1>

  <div class="digit-display" id="digitDisplay"></div>

  <div class="transport">
    <button id="btnPlay" onclick="togglePlay()">&#9654; PLAY</button>
    <button id="btnStop" onclick="stopPlayback()">&#9632; STOP</button>
  </div>

  <div class="toggles">
    <button class="toggle-btn on" data-channel="kick" onclick="toggleChannel(this)">
      <span class="icon">&#9679;</span>KICK
    </button>
    <button class="toggle-btn on" data-channel="bass" onclick="toggleChannel(this)">
      <span class="icon">&#9836;</span>BASS
    </button>
    <button class="toggle-btn on" data-channel="hihat" onclick="toggleChannel(this)">
      <span class="icon">&#9670;</span>HH
    </button>
    <button class="toggle-btn on" data-channel="pad" onclick="toggleChannel(this)">
      <span class="icon">&#9740;</span>PAD
    </button>
    <button class="toggle-btn on" data-channel="riser" onclick="toggleChannel(this)">
      <span class="icon">&#9650;</span>RISE
    </button>
    <button class="toggle-btn on" data-channel="vox" onclick="toggleChannel(this)">
      <span class="icon">&#9833;</span>VOX
    </button>
  </div>

  <div class="sliders">
    <div class="slider-row">
      <span class="slider-label">BPM</span>
      <input type="range" min="100" max="180" value="140" id="slBpm" oninput="updateSlider('bpm')">
      <span class="slider-value" id="valBpm">140</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Digits/Phrase</span>
      <input type="range" min="3" max="8" value="5" step="1" id="slDigits" oninput="updateSlider('digits')">
      <span class="slider-value" id="valDigits">5</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Rest Beats</span>
      <input type="range" min="2" max="12" value="6" step="1" id="slRest" oninput="updateSlider('rest')">
      <span class="slider-value" id="valRest">6</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Filter</span>
      <input type="range" min="200" max="5000" value="1800" id="slFilter" oninput="updateSlider('filter')">
      <span class="slider-value" id="valFilter">1800 Hz</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Voice Vol</span>
      <input type="range" min="0" max="100" value="90" id="slVox" oninput="updateSlider('vox')">
      <span class="slider-value" id="valVox">90%</span>
    </div>
  </div>

  <div class="status" id="status">Press PLAY to begin the infinite digits of &pi;</div>
  <footer style="margin-top:32px;padding:16px;opacity:0.5;font-size:13px">
    <a href="https://github.com/serg123e/Piday/" target="_blank" rel="noopener" style="color:#33ff33;text-decoration:none">GitHub</a>
  </footer>
</div>

<script>
// ============================================================
//  PI DIGITS (first 10000)
// ============================================================
// Dynamic pi digits - starts with seed, fetches more from API as needed
let PI_STR = "3.14159265358979323846264338327950288419716939937510";
let piFetchedTotal = 51; // API offset: "3" counts as position 0, so 50 digits after decimal = position 51
let piFetching = false;
let piFetchRetries = 0;
let piDigitsExhausted = false; // true when API failed and digits ran out
const PI_FETCH_CHUNK = 1000;
const PI_PREFETCH_MARGIN = 200;
const PI_FETCH_MAX_RETRIES = 3;

async function fetchPiDigits(start, count) {
  const url = `https://api.pi.delivery/v1/pi?start=${start}&numberOfDigits=${count}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`Pi API error: ${resp.status}`);
  const data = await resp.json();
  return data.content;
}

async function ensurePiDigits(neededIndex) {
  if (piDigitsExhausted || piFetching) return;
  const digitsAvailable = PI_STR.length - 2;
  const remaining = digitsAvailable - (neededIndex - 2);
  if (remaining > PI_PREFETCH_MARGIN) return;

  piFetching = true;
  try {
    const raw = await fetchPiDigits(piFetchedTotal, PI_FETCH_CHUNK);
    PI_STR += raw;
    piFetchedTotal += PI_FETCH_CHUNK;
    piFetchRetries = 0;
    console.log(`Pi digits loaded: ${piFetchedTotal} total`);
  } catch (e) {
    piFetchRetries++;
    console.error(`Failed to fetch pi digits (attempt ${piFetchRetries}/${PI_FETCH_MAX_RETRIES}):`, e);
    if (piFetchRetries < PI_FETCH_MAX_RETRIES) {
      piFetching = false;
      setTimeout(() => ensurePiDigits(neededIndex), 2000 * piFetchRetries);
      return;
    }
    console.warn('Pi digit fetching exhausted — voice will stop, music continues');
    piDigitsExhausted = true;
  } finally {
    piFetching = false;
  }
}

// ============================================================
//  AUDIO ENGINE
// ============================================================

// Channel gain nodes

// Parameters

  bpm: 140,
  digitsPerPhrase: 5,
  restBeats: 6,
  filterMax: 1800,
  voxVol: 0.9
};

async function loadSamples() {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  const promises = [];
  for (const [digit, dataUri] of Object.entries(DIGIT_SAMPLES)) {
    const p = fetch(dataUri)
      .then(r => r.arrayBuffer())
      .then(buf => ctx.decodeAudioData(buf))
      .then(decoded => { digitBuffers[digit] = decoded; });
    promises.push(p);
  }
  await Promise.all(promises);
  samplesLoaded = true;
}

// ============================================================
//  SYNTHESIZERS (Web Audio API)
// ============================================================

function playKick(time) {
  if (!channelEnabled.kick) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(160, time);
  osc.frequency.exponentialRampToValueAtTime(38, time + 0.15);
  gain.gain.setValueAtTime(0.8, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);

  // Click transient
  const osc2 = ctx.createOscillator();
  const gain2 = ctx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(1000, time);
  gain2.gain.setValueAtTime(0.4, time);
  gain2.gain.exponentialRampToValueAtTime(0.001, time + 0.02);

  osc.connect(gain).connect(channels.kick);
  osc2.connect(gain2).connect(channels.kick);
  osc.start(time);
  osc.stop(time + 0.16); // stop after envelope decays
  osc2.start(time);
  osc2.stop(time + 0.03); // stop after gain reaches ~zero
}

function playHihat(time, vol) {
  if (!channelEnabled.hihat) return;
  const bufferSize = ctx.sampleRate * 0.05;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.0125));
  }
  const src = ctx.createBufferSource();
  src.buffer = buffer;

  // Bandpass for metallic sound
  const bp = ctx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 8000;
  bp.Q.value = 1.5;

  const gain = ctx.createGain();
  gain.gain.value = 0.15 * (vol || 1.0);

  src.connect(bp).connect(gain).connect(channels.hihat);
  src.start(time);
}

function playBassNote(time, freq, duration, filterCutoff) {
  if (!channelEnabled.bass) return;

  // Multi-harmonic oscillators
  const harmonics = [1, 2, 3, 4, 5];
  const gains_arr = [1.0, 0.6, 0.35, 0.2, 0.1];

  const merger = ctx.createGain();
  merger.gain.value = 0.35;

  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = filterCutoff;
  filter.Q.value = 0.7; // no resonance to avoid clicks

  const env = ctx.createGain();
  env.gain.setValueAtTime(0.001, time);
  env.gain.linearRampToValueAtTime(1.0, time + 0.003);
  env.gain.setValueAtTime(1.0, time + 0.003);
  env.gain.exponentialRampToValueAtTime(0.001, time + duration);

  const stopTime = time + duration + 0.01;
  harmonics.forEach((h, i) => {
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq * h;
    const g = ctx.createGain();
    g.gain.value = gains_arr[i];
    osc.connect(g).connect(merger);
    osc.start(time);
    osc.stop(stopTime); // stop after envelope reaches zero
  });

  merger.connect(env).connect(filter).connect(channels.bass);
}

function playPad(time, freq, duration) {
  if (!channelEnabled.pad) return;
  const detunes = [0, 5, -5]; // cents
  const merger = ctx.createGain();
  merger.gain.value = 0.06;

  const env = ctx.createGain();
  const attackEnd = time + Math.min(0.3, duration * 0.3);
  const releaseStart = time + duration - Math.min(0.5, duration * 0.4);
  env.gain.setValueAtTime(0.001, time);
  env.gain.linearRampToValueAtTime(1.0, attackEnd);
  env.gain.linearRampToValueAtTime(1.0, releaseStart);
  env.gain.linearRampToValueAtTime(0.001, time + duration);

  // LFO for movement
  const lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();
  lfo.type = 'sine';
  lfo.frequency.value = 0.25;
  lfoGain.gain.value = 0.15;
  lfo.connect(lfoGain);

  detunes.forEach(d => {
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;
    osc.detune.value = d;
    const g = ctx.createGain();
    g.gain.value = d === 0 ? 1.0 : 0.8;
    lfoGain.connect(g.gain); // modulate
    osc.connect(g).connect(merger);
    osc.start(time);
    osc.stop(time + duration + 0.1);
  });
  lfo.start(time);
  lfo.stop(time + duration + 0.1);

  // Octave
  const osc2 = ctx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = freq * 2.001;
  const g2 = ctx.createGain();
  g2.gain.value = 0.5;
  osc2.connect(g2).connect(merger);
  osc2.start(time);
  osc2.stop(time + duration + 0.1);

  merger.connect(env).connect(channels.pad);
}

function playRiser(time, duration) {
  if (!channelEnabled.riser) return;
  const bufferSize = Math.ceil(ctx.sampleRate * duration);
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    const t = i / bufferSize;
    data[i] = (Math.random() * 2 - 1) * t * t; // crescendo envelope
  }
  const src = ctx.createBufferSource();
  src.buffer = buffer;

  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(500, time);
  filter.frequency.exponentialRampToValueAtTime(8500, time + duration);
  filter.Q.value = 3;

  const gain = ctx.createGain();
  gain.gain.value = 0.15;

  src.connect(filter).connect(gain).connect(channels.riser);
  src.start(time);
  src.stop(time + duration);
}

function playDigitSample(time, digit) {
  if (!channelEnabled.vox || !digitBuffers[digit]) return;
  const src = ctx.createBufferSource();
  src.buffer = digitBuffers[digit];
  const gain = ctx.createGain();
  gain.gain.value = params.voxVol;
  src.connect(gain).connect(channels.vox);
  src.start(time);
}

// ============================================================
//  PHRASE / SCHEDULING STATE MACHINE
// ============================================================

// State: 'integer' | 'speaking' | 'resting'
let state = 'integer';
let beatsInState = 0;
let totalBeats = 0;

// Bass tonality
let bassPhraseEven = true; // alternates each phrase

// Bass note pattern
function getBassFreq(beatInBar) {
  if (bassPhraseEven) {
    // E minor
    const freqs = [41.20, 41.20, 49.00, 41.20, 46.25, 41.20, 49.00, 55.00];
    return freqs[beatInBar % freqs.length];
  } else {
    // A minor
    const freqs = [55.00, 55.00, 58.27, 55.00, 51.91, 55.00, 58.27, 61.74];
    return freqs[beatInBar % freqs.length];
  }
}

// Pad notes
const padNotesEven = [82.41, 98.00, 123.47]; // Em
const padNotesOdd = [110.00, 130.81, 164.81]; // Am

// Hihat pattern state
let barCount = 0;

function scheduleBar(startTime) {
  const beatDur = 60.0 / params.bpm;
  const sixteenthDur = beatDur / 4;
  const progress = Math.min(barCount / 64, 1); // normalize to ~64 bars
  const filterCutoff = 300 + progress * (params.filterMax - 300);

  // KICK on every beat
  for (let beat = 0; beat < 4; beat++) {
    playKick(startTime + beat * beatDur);
  }

  // HIHAT — evolving pattern
  for (let s = 0; s < 16; s++) {
    const t = startTime + s * sixteenthDur;
    const isOffbeat8th = s % 4 === 2;
    let play = isOffbeat8th;
    let vol = 1.0;

    if (!play && progress > 0.25 && [1, 5, 9, 13].includes(s)) {
      play = Math.random() < (progress - 0.25) * 0.6;
      vol = 0.5 + progress * 0.3;
    }
    if (!play && progress > 0.5 && [3, 7, 11, 15].includes(s)) {
      play = Math.random() < (progress - 0.5) * 0.5;
      vol = 0.4 + progress * 0.3;
    }
    if (play) playHihat(t, vol);
  }

  // BASS — 16th note pattern with sidechain ducking simulation
  for (let s = 0; s < 16; s++) {
    const t = startTime + s * sixteenthDur;
    const beatInBar = Math.floor(s / 4);
    const freq = getBassFreq(barCount * 4 + beatInBar) * (s % 2 === 1 ? 1.02 : 1.0);
    playBassNote(t, freq, sixteenthDur * 0.85, filterCutoff);
  }

  barCount++;
}

// ============================================================
//  MAIN SCHEDULER (lookahead)
// ============================================================
const LOOKAHEAD = 0.15; // seconds
const SCHEDULE_INTERVAL = 50; // ms

function scheduler() {
  const beatDur = 60.0 / params.bpm;
  const barDur = beatDur * 4;

  while (nextBeatTime < ctx.currentTime + LOOKAHEAD) {
    processState(nextBeatTime, beatDur, barDur);
    currentBeat++;
    nextBeatTime += beatDur;
  }
}

let riserScheduled = false;
let padScheduled = false;
let speakBeatsPerDigit = 2;

function processState(time, beatDur, barDur) {
  totalBeats++;

  switch (state) {
    case 'integer':
      // First phrase: just "3", on beat 4 (after 4 beats of intro)
      if (beatsInState === 0) {
        // Schedule first 4 beats of kick/hihat/bass as intro
      }
      if (beatsInState % 4 === 0) {
        scheduleBar(time);
      }
      if (beatsInState === 4) {
        // Play "3"
        playDigitSample(time, '3');
        highlightDigit(0); // "3" is at index 0
        piIndex = 2; // skip "3."
      }
      beatsInState++;
      // Integer phrase: 10 speak beats + rest beats
      const intPhraseTotalBeats = 10 + params.restBeats;
      if (beatsInState >= intPhraseTotalBeats) {
        state = 'speaking';
        beatsInState = 0;
        digitInPhrase = 0;
        bassPhraseEven = false; // first decimal phrase is odd
        riserScheduled = false;
        padScheduled = false;
      }
      break;

    case 'speaking':
      // Schedule bars
      if (beatsInState % 4 === 0) {
        scheduleBar(time);
      }

      // Play digit every 2 beats
      if (beatsInState % speakBeatsPerDigit === 0 && digitInPhrase < params.digitsPerPhrase) {
        if (piIndex < PI_STR.length) {
          const digit = PI_STR[piIndex];
          if (digit !== '.') {
            playDigitSample(time, digit);
            highlightDigit(piIndex);

            // Exhale envelope for voice volume
            const progress = digitInPhrase / Math.max(params.digitsPerPhrase - 1, 1);
            let vol;
            if (progress < 0.2) vol = 0.75 + progress * 1.25;
            else vol = 1.0 - progress * 0.25;
            // (volume modulation applied through gain)
          }
          piIndex++;
          digitInPhrase++;
          ensurePiDigits(piIndex);
        } else {
          // Digits exhausted — skip voice, keep music playing
          digitInPhrase++;
        }
      }

      beatsInState++;
      const speakTotal = params.digitsPerPhrase * speakBeatsPerDigit;
      if (beatsInState >= speakTotal) {
        state = 'resting';
        beatsInState = 0;
        riserScheduled = false;
        padScheduled = false;
      }
      break;

    case 'resting':
      if (beatsInState % 4 === 0) {
        scheduleBar(time);
      }

      // Pad during rest
      if (!padScheduled && phraseCount > 1) {
        const padNotes = bassPhraseEven ? padNotesEven : padNotesOdd;
        const freq = padNotes[phraseCount % padNotes.length];
        const padDur = params.restBeats * beatDur;
        playPad(time, freq, padDur);
        padScheduled = true;
      }

      // Riser near end of rest
      if (!riserScheduled && beatsInState >= Math.max(params.restBeats - 3, 0)) {
        const riserDur = Math.min(3, params.restBeats) * beatDur;
        playRiser(time, riserDur);
        riserScheduled = true;
      }

      beatsInState++;
      if (beatsInState >= params.restBeats) {
        state = 'speaking';
        beatsInState = 0;
        digitInPhrase = 0;
        phraseCount++;
        bassPhraseEven = !bassPhraseEven;
        riserScheduled = false;
        padScheduled = false;
      }
      break;
  }
}

// ============================================================
//  DIGIT DISPLAY
// ============================================================
function highlightDigit(idx) {
  // Schedule UI update on next animation frame
  requestAnimationFrame(() => {
    const display = document.getElementById('digitDisplay');
    // Show a window of digits around current position
    const totalWindow = 15;
    const windowBefore = 7;
    const start = Math.max(0, idx - windowBefore);
    const end = Math.min(PI_STR.length, start + totalWindow);

    let html = '';
    for (let i = start; i < end; i++) {
      const ch = PI_STR[i];
      if (ch === '.') {
        html += `<span class="dot">. </span>`;
      } else if (i === idx) {
        html += `<span class="current">${ch} </span>`;
      } else if (i < idx) {
        html += `<span class="dim">${ch} </span>`;
      } else {
        html += `<span>${ch} </span>`;
      }
    }
    html += '<span class="dim">...</span>'; // always show ... (infinite digits)
    display.innerHTML = html;

    // Update status (skip for initial state)
    if (idx >= 0) {
      document.getElementById('status').textContent =
        `Digit ${idx - 1} of \u03C0 | Phrase ${phraseCount + 1} | Bar ${barCount}`;
    }
  });
}

// ============================================================
//  UI CONTROLS
// ============================================================

function toggleChannel(btn) {
  const ch = btn.dataset.channel;
  channelEnabled[ch] = !channelEnabled[ch];
  btn.classList.toggle('on', channelEnabled[ch]);

  // Mute/unmute the gain node if it exists
  if (channels[ch]) {
    channels[ch].gain.value = channelEnabled[ch] ? 1.0 : 0.0;
  }
}

function updateSlider(name) {
  switch (name) {
    case 'bpm':
      params.bpm = parseInt(document.getElementById('slBpm').value);
      document.getElementById('valBpm').textContent = params.bpm;
      break;
    case 'digits':
      params.digitsPerPhrase = parseInt(document.getElementById('slDigits').value);
      document.getElementById('valDigits').textContent = params.digitsPerPhrase;
      break;
    case 'rest':
      params.restBeats = parseInt(document.getElementById('slRest').value);
      document.getElementById('valRest').textContent = params.restBeats;
      break;
    case 'filter':
      params.filterMax = parseInt(document.getElementById('slFilter').value);
      document.getElementById('valFilter').textContent = params.filterMax + ' Hz';
      break;
    case 'vox':
      params.voxVol = parseInt(document.getElementById('slVox').value) / 100;
      document.getElementById('valVox').textContent = document.getElementById('slVox').value + '%';
      if (channels.vox) channels.vox.gain.value = channelEnabled.vox ? params.voxVol : 0;
      break;
  }
}

async function togglePlay() {
  if (isPlaying) {
    pausePlayback();
  } else {
    await startPlayback();
  }
}

async function startPlayback() {
  if (!ctx) {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (ctx.state === 'suspended') await ctx.resume();

  if (!samplesLoaded) {
    document.getElementById('loading').classList.remove('hidden');
    await loadSamples();
    document.getElementById('loading').classList.add('hidden');
  }

  // Create channel gain nodes
  const master = ctx.createGain();
  master.gain.value = 0.85;
  master.connect(ctx.destination);

  // Compressor for glue
  const compressor = ctx.createDynamicsCompressor();
  compressor.threshold.value = -12;
  compressor.ratio.value = 4;
  compressor.attack.value = 0.003;
  compressor.release.value = 0.1;
  compressor.connect(master);

  for (const ch of ['kick', 'bass', 'hihat', 'pad', 'riser', 'vox']) {
    channels[ch] = ctx.createGain();
    channels[ch].gain.value = channelEnabled[ch] ? 1.0 : 0.0;
    channels[ch].connect(compressor);
  }

  // Reset state
  state = 'integer';
  beatsInState = 0;
  currentBeat = 0;
  piIndex = 0;
  phraseCount = 0;
  digitInPhrase = 0;
  barCount = 0;
  bassPhraseEven = true;
  riserScheduled = false;
  padScheduled = false;
  totalBeats = 0;
  nextBeatTime = ctx.currentTime + 0.1;

  // Prefetch pi digits on start
  ensurePiDigits(piIndex);

  isPlaying = true;
  document.getElementById('btnPlay').textContent = '\u275A\u275A PAUSE';
  document.getElementById('btnPlay').classList.add('active');
  document.body.classList.add('playing');

  schedulerTimer = setInterval(scheduler, SCHEDULE_INTERVAL);
}

function pausePlayback() {
  isPlaying = false;
  if (schedulerTimer) clearInterval(schedulerTimer);
  schedulerTimer = null;
  document.getElementById('btnPlay').textContent = '\u25B6 PLAY';
  document.getElementById('btnPlay').classList.remove('active');
}

function stopPlayback() {
  pausePlayback();
  if (ctx) {
    ctx.close();
    ctx = null;
  }
  samplesLoaded = false;
  document.body.classList.remove('playing');
  document.getElementById('status').textContent = 'Press PLAY to begin the infinite digits of \u03C0';
  piDigitsExhausted = false;
  piFetchRetries = 0;
  highlightDigit(-1);
}

// Hide loading on start
document.getElementById('loading').classList.add('hidden');
highlightDigit(-1);
</script>
